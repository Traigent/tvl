# Example: Text-to-SQL
# Mirrors the running example in Section 3, Listing 1 of the ASE 2026 TVL paper.
tvl:
  module: corp.automation.text_to_sql

environment:
  snapshot_id: "2024-01-20T00:00:00Z"
  context:
    query_budget_usd: 0.01

evaluation_set:
  dataset: s3://datasets/text-to-sql/dev.parquet
  seed: 99

tvars:
  - name: planner
    type: enum[str]
    domain: ["naive", "cot", "least_to_most"]
  - name: model
    type: enum[str]
    domain: ["gpt-4o-mini", "gpt-4.1", "gemini-2.5-flash"]
  - name: max_steps
    type: int
    domain: [4, 8]
  - name: schema_context_mode
    type: enum[str]
    domain: ["minimal", "balanced", "rich"]

constraints:
  structural:
    - when: planner = "naive"
      then: schema_context_mode = "minimal"
  derived:
    - require: env.context.query_budget_usd >= 0.008

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize
  - name: cost_usd_per_task
    metric_ref: metrics.cost_usd_per_task.v1
    direction: minimize
  - name: latency_s
    metric_ref: metrics.latency_s.v1
    direction: minimize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  adjust: holm
  min_effect:
    quality: 0.01
    cost_usd_per_task: 0.0001
    latency_s: 0.20
  chance_constraints:
    - name: timeout_rate
      threshold: 0.05
      confidence: 0.95
