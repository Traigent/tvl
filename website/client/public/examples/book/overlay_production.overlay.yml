# Production overlay for the base TVL module.
# This file is composed into a valid TVL module via `tvl-compose`.

_tvl_overlay:
  extends: overlay_base_module.tvl.yml

overrides:
  evaluation_set:
    dataset: s3://datasets/book/overlays/production_canary.jsonl
  tvars:
    - name: model
      domain: ["gpt-4o-mini", "claude-3-haiku"]
    - name: temperature
      domain:
        range: [0.0, 0.4]
        resolution: 0.05
  exploration:
    budgets:
      max_trials: 48
      max_wallclock_s: 1800
