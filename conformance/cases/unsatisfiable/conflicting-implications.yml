# Note: This is illustrative. SMT unsat checking validates conflicting constraints.
tvl:
  module: conformance.unsatisfiable.conflicting_implications
tvl_version: "1.0"

environment:
  snapshot_id: "2024-01-01T00:00:00Z"

evaluation_set:
  dataset: "test://unsat"

tvars:
  - name: k
    type: int
    domain:
      range: [0, 5]
  - name: flag
    type: bool
    domain: [true, false]

constraints:
  structural:
    # These implications together with domain constraints are unsatisfiable
    - when: flag = true
      then: k = 0
    - when: flag = false
      then: k = 0
    - when: k = 0
      then: flag = true
    - when: k = 0
      then: flag = false

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.1
