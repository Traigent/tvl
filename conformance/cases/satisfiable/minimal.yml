# Minimal satisfiable TVL module for conformance testing
tvl:
  module: conformance.satisfiable.minimal
tvl_version: "1.0"

environment:
  snapshot_id: "2024-01-01T00:00:00Z"

evaluation_set:
  dataset: "test://minimal"

tvars:
  - name: x
    type: int
    domain:
      range: [0, 10]

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.1
