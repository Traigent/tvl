# Example: Structural Unsat Core Preview
# Use `TVL: Check Structural Realisability` to see the contradictory clauses highlighted in the Problems panel.
# Comment out the upper-bound constraint to verify the witness preview rendering in the output channel.
tvl:
  module: corp.validation.ide_structural_core

environment:
  snapshot_id: "2025-02-01T00:00:00Z"
  bindings:
    dataset_version: "dev"

evaluation_set:
  dataset: s3://datasets/validation/dev.parquet

tvars:
  - name: retriever.k
    type: int
    domain:
      range: [5, 10]
  - name: reranker.enabled
    type: bool
    domain: [true, false]

constraints:
  structural:
    - expr: retriever.k <= 4
    - expr: retriever.k >= 3
    - when: reranker.enabled = true
      then: retriever.k >= 2
  derived: []

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.01

exploration:
  strategy:
    type: grid
