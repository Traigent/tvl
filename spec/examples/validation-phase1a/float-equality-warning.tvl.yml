# Example: Floating-Point Equality Warning
tvl:
  module: corp.validation.float_equality

environment:
  snapshot_id: "2025-01-01T00:00:00Z"
  bindings:
    evaluator: v1

evaluation_set:
  dataset: s3://datasets/validation/dev.parquet

tvars:
  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]

constraints:
  structural:
    - expr: temperature = 0.25   # triggers float_equality warning
  derived: []

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.01
