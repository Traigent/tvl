# Example: Chance Constraint with Invalid Threshold (E5005)
# Per spec: threshold must be in [0, 1].
# This spec should FAIL validation with error code E5005.

tvl:
  module: corp.validation.chance_invalid_threshold

environment:
  snapshot_id: "2025-01-01T00:00:00Z"

evaluation_set:
  dataset: s3://datasets/validation/dev.parquet

tvars:
  - name: model
    type: enum[str]
    domain: ["gpt-4", "claude-3"]

constraints:
  structural: []
  derived: []

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.01

  chance_constraints:
    # ERROR: Invalid threshold (> 1)
    - name: safety_violation
      threshold: 1.5        # E5005: threshold must be in [0, 1]
      confidence: 0.95

exploration:
  strategy:
    type: grid

# Expected validation result:
# - Error: E5005 invalid_chance_threshold at promotion_policy.chance_constraints[0].threshold
# - Message: "Chance constraint threshold (1.5) must be in range [0, 1]"
