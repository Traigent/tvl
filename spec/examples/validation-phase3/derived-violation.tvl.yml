# Example: Derived Constraint Violation
# Demonstrates operational failure when environment metrics break a derived inequality.
tvl:
  module: corp.validation.operational_derived_violation

environment:
  snapshot_id: "2025-01-01T00:00:00Z"
  context:
    cost_usd: 12.5

evaluation_set:
  dataset: s3://datasets/validation/dev.parquet

tvars:
  - name: strategy
    type: enum[str]
    domain: ["grid", "random"]

constraints:
  structural: []
  derived:
    - require: env.context.cost_usd <= 5

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.0

exploration:
  strategy:
    type: grid
