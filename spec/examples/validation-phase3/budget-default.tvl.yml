# Example: Operational Budgets (Default)
# Demonstrates budgets passing with default validation settings.
tvl:
  module: corp.validation.operational_default

environment:
  snapshot_id: "2025-01-01T00:00:00Z"
  context:
    available_budget_usd: 75

evaluation_set:
  dataset: s3://datasets/validation/dev.parquet

tvars:
  - name: strategy
    type: enum[str]
    domain: ["grid", "random"]

constraints:
  structural: []
  derived:
    - require: env.context.available_budget_usd >= 50

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.0

exploration:
  strategy:
    type: grid
  budgets:
    max_trials: 40
    max_spend_usd: 60
    max_wallclock_s: 3600
