# Example: Implication Sugar
tvl:
  module: corp.validation.implication

environment:
  snapshot_id: "2025-01-01T00:00:00Z"

evaluation_set:
  dataset: s3://datasets/validation/dev.parquet

tvars:
  - name: use_examples
    type: bool
    domain: [true, false]
  - name: max_calls
    type: int
    domain:
      range: [0, 5]

constraints:
  structural:
    - when: use_examples = true
      then: max_calls >= 2
  derived: []

objectives:
  - name: quality
    metric_ref: metrics.quality.v1
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.01
