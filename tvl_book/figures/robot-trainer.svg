<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="200" cy="200" r="180" fill="#F7FAFC" opacity="0.5"/>
    
    <!-- Robot Body -->
    <rect x="120" y="140" width="160" height="180" rx="20" fill="#805AD5"/>
    <rect x="130" y="150" width="140" height="160" rx="15" fill="#6B46C1"/>
    
    <!-- Robot Head -->
    <rect x="140" y="80" width="120" height="100" rx="15" fill="#805AD5"/>
    <rect x="150" y="90" width="100" height="80" rx="10" fill="#6B46C1"/>
    
    <!-- Robot Eyes -->
    <circle cx="175" cy="120" r="15" fill="#4FD1C5"/>
    <circle cx="225" cy="120" r="15" fill="#4FD1C5"/>
    <circle cx="175" cy="120" r="8" fill="#white"/>
    <circle cx="225" cy="120" r="8" fill="#white"/>
    
    <!-- Robot Antenna -->
    <rect x="190" y="50" width="20" height="30" fill="#805AD5"/>
    <circle cx="200" cy="40" r="10" fill="#4FD1C5"/>
    
    <!-- Robot Arms -->
    <rect x="80" y="160" width="40" height="120" rx="20" fill="#805AD5"/>
    <rect x="280" y="160" width="40" height="120" rx="20" fill="#805AD5"/>
    
    <!-- Training Elements -->
    <circle cx="70" cy="150" r="10" fill="#4FD1C5" opacity="0.6">
        <animate attributeName="cy" values="150;140;150" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="170" r="8" fill="#4FD1C5" opacity="0.6">
        <animate attributeName="cy" values="170;160;170" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="340" r="12" fill="#4FD1C5" opacity="0.6">
        <animate attributeName="cy" values="340;330;340" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Binary Code Background -->
    <text x="50" y="50" fill="#805AD5" opacity="0.2" font-family="monospace" font-size="12">
        1010 0101
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="280" y="380" fill="#805AD5" opacity="0.2" font-family="monospace" font-size="12">
        0101 1010
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </text>
    
    <!-- Graduation Cap -->
    <path d="M160 60 L240 60 L200 30 Z" fill="#4FD1C5"/>
    <rect x="190" y="55" width="20" height="5" fill="#4FD1C5"/>
    
    <!-- Smile -->
    <path d="M175 150 Q200 170 225 150" stroke="#4FD1C5" stroke-width="5" fill="none"/>
</svg>
