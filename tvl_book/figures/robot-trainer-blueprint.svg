<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint background -->
  <rect x="0" y="0" width="400" height="400" fill="#0F172A"/>
  <g opacity="0.18" stroke="#60A5FA" stroke-width="1">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/><line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="40" y1="0" x2="40" y2="400"/><line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
  </g>

  <!-- Robot outline -->
  <g stroke="#60A5FA" stroke-width="4" fill="none" stroke-linejoin="round">
    <rect x="110" y="130" width="180" height="190" rx="26"/>
    <rect x="140" y="70" width="120" height="100" rx="18"/>
    <line x1="200" y1="50" x2="200" y2="30"/>
    <circle cx="200" cy="25" r="10"/>
    <line x1="90" y1="170" x2="60" y2="250"/>
    <line x1="310" y1="170" x2="340" y2="250"/>
    <rect x="150" y="250" width="100" height="50" rx="12"/>
  </g>

  <!-- Screen and details -->
  <rect x="155" y="95" width="90" height="60" rx="8" fill="#1E293B" stroke="#60A5FA" stroke-width="3"/>
  <circle cx="175" cy="125" r="8" fill="#38BDF8"/>
  <circle cx="225" cy="125" r="8" fill="#38BDF8"/>
  <path d="M175 150 Q200 165 225 150" stroke="#38BDF8" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Blueprint annotations -->
  <g font-family="monospace" font-size="12" fill="#60A5FA">
    <text x="60" y="310">spec.tvars.model</text>
    <text x="250" y="210">latency ≤ 1200ms</text>
    <text x="140" y="350">pareto: {quality, cost}</text>
  </g>
</svg>
