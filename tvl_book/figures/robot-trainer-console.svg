<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark console background -->
  <rect width="400" height="400" rx="24" fill="#111827"/>

  <!-- Status header -->
  <rect x="40" y="36" width="320" height="52" rx="12" fill="#1F2937" stroke="#4B5563" stroke-width="2"/>
  <text x="60" y="66" font-family="monospace" font-size="16" fill="#A7F3D0">TVO SESSION ── ONLINE</text>
  <circle cx="320" cy="62" r="8" fill="#34D399"/>

  <!-- Robot body -->
  <rect x="120" y="120" width="160" height="190" rx="24" fill="#1F2937" stroke="#6EE7B7" stroke-width="3"/>
  <rect x="145" y="150" width="110" height="120" rx="18" fill="#10B981" opacity="0.18"/>

  <!-- Head -->
  <rect x="140" y="70" width="120" height="90" rx="20" fill="#1F2937" stroke="#6EE7B7" stroke-width="3"/>
  <rect x="160" y="90" width="80" height="50" rx="10" fill="#0F172A"/>
  <circle cx="182" cy="115" r="7" fill="#FDE68A"/>
  <circle cx="218" cy="115" r="7" fill="#FDE68A"/>
  <path d="M182 135 Q200 148 218 135" stroke="#FDE68A" stroke-width="3" fill="none"/>

  <!-- Antenna -->
  <rect x="195" y="40" width="10" height="25" fill="#6EE7B7"/>
  <circle cx="200" cy="34" r="9" fill="#FACC15"/>

  <!-- Arms -->
  <rect x="88" y="160" width="36" height="120" rx="16" fill="#1F2937" stroke="#6EE7B7" stroke-width="3"/>
  <rect x="276" y="160" width="36" height="120" rx="16" fill="#1F2937" stroke="#6EE7B7" stroke-width="3"/>

  <!-- Console readouts -->
  <g font-family="monospace" font-size="13" fill="#93C5FD">
    <text x="70" y="240">model: gpt-4o-mini</text>
    <text x="70" y="264">temperature: 0.3</text>
    <text x="70" y="288">retriever.k: 6</text>
    <text x="70" y="312">zero_shot: false</text>
  </g>
  <g font-family="monospace" font-size="13" fill="#FDE68A">
    <text x="230" y="240">quality ▲ +0.9%</text>
    <text x="230" y="264">latency ▼ -180ms</text>
    <text x="230" y="288">budget 48 trials</text>
  </g>

  <!-- Footer timeline -->
  <line x1="80" y1="340" x2="320" y2="340" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="340" r="6" fill="#6EE7B7"/>
  <circle cx="200" cy="340" r="6" fill="#6EE7B7"/>
  <circle cx="280" cy="340" r="6" fill="#6EE7B7"/>
  <text x="105" y="360" font-family="monospace" font-size="11" fill="#9CA3AF">SPEC</text>
  <text x="185" y="360" font-family="monospace" font-size="11" fill="#9CA3AF">SEARCH</text>
  <text x="262" y="360" font-family="monospace" font-size="11" fill="#9CA3AF">PROMOTE</text>
</svg>
